title: TDLiDAR
description: Turn an iPhone into ~40 live sensors inside TouchDesigner — one drag-and-drop.

# Built as a GitHub Pages remote theme (no local build / CI needed).
remote_theme: just-the-docs/just-the-docs

# Project site lives at https://tdlidar.github.io/DOC/
url: https://tdlidar.github.io
baseurl: "/DOC"

color_scheme: dark
search_enabled: true

# Give every page the theme's default layout so source pages only need title/nav_order.
defaults:
  - scope:
      path: ""
    values:
      layout: default

aux_links:
  "TDLiDAR on GitHub":
    - "https://github.com/TDLiDAR/DOC"
aux_links_new_tab: true

# Repo files that are not site pages.
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - .gitignore
  - docs

plugins:
  - jekyll-remote-theme
