title: TDLiDAR
description: Turn an iPhone into ~40 live sensors inside TouchDesigner — one drag-and-drop.

# Built as a GitHub Pages remote theme (no local build / CI needed).
remote_theme: just-the-docs/just-the-docs

# Project site lives at https://tdlidar.github.io/DOC/
url: https://tdlidar.github.io
baseurl: "/DOC"

# Custom TDLiDAR scheme: Apple true-black, system-blue accents, white borders, JetBrains Mono.
color_scheme: tdlidar
logo: "/assets/images/logo.png"
search_enabled: true
enable_copy_code_button: true

# Render fenced ```mermaid blocks (theme is set in _includes/mermaid_config.js).
mermaid:
  version: "11.4.1"

# Coloured callout blocks: end a blockquote with {: .note } / {: .tip } / etc.
callouts:
  note:
    color: blue
    title: Note
  tip:
    color: green
    title: Tip
  important:
    color: purple
    title: Important
  warning:
    color: yellow
    title: Warning
  caution:
    color: red
    title: Heads up

# Header buttons (App Store / Patreon / GitHub) are injected via _includes/header_custom.html.

# Give every page the theme's default layout so source pages only need title/nav_order.
defaults:
  - scope:
      path: ""
    values:
      layout: default

# Repo files that are not site pages.
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - .gitignore

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-include-cache
